name: Update AMVGG Values

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  update-values:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download AMVGG calculator
        run: curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" "https://amvgg.com/calculator" -o calculator.html

      - name: Extract values and write Lua database
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          html = Path("calculator.html").read_text(encoding="utf-8", errors="ignore")

          # 1. Normalize Next.js escaped data strings into standard clean text
          normalized = re.sub(r'\\+"', '"', html)
          normalized = normalized.replace('&quot;', '"')

          # 2. Find all normalized name boundaries
          name_pattern = re.compile(r'"name"\s*:\s*"([^"]+)"')
          values = {}

          def extract_field(block, field_name):
              # Check for standard string matches ("field":"value")
              match = re.search(r'"' + re.escape(field_name) + r'"\s*:\s*"([^"]*)"', block)
              if match:
                  return match.group(1)
              # Fallback check for unquoted numbers or booleans ("field":10.5)
              match = re.search(r'"' + re.escape(field_name) + r'"\s*:\s*([0-9.-]+)', block)
              return match.group(1) if match else ""

          for name_match in name_pattern.finditer(normalized):
              name = name_match.group(1)
              
              # Filter out layout keywords or structural configurations
              if not name or len(name) > 60 or name.lower() in ["viewport", "charset", "description"]:
                  continue
                  
              # Isolate the specific object chunk enclosing this pet entry
              start_idx = normalized.rfind('{', max(0, name_match.start() - 1000), name_match.start())
              end_idx = normalized.find('}', name_match.end(), min(len(normalized), name_match.end() + 1000))
              
              if start_idx != -1 and end_idx != -1:
                  window = normalized[start_idx:end_idx+1]
              else:
                  window = normalized[max(0, name_match.start()-200):min(len(normalized), name_match.end()+800)]
              
              # Verify this local window is actually a calculator value record
              if "regularValue" not in window and "neonValue" not in window:
                  continue

              values[name.lower()] = {
                  "name": name,
                  "id": extract_field(window, "id"),
                  "regular": extract_field(window, "regularValue"),
                  "neon": extract_field(window, "neonValue"),
                  "mega": extract_field(window, "megaValue"),
                  "noPotionRegular": extract_field(window, "npRegularValue"),
                  "noPotionNeon": extract_field(window, "npNeonValue"),
                  "noPotionMega": extract_field(window, "npMegaValue"),
                  "demand": extract_field(window, "regularDemand"),
              }

          # Safety guard check
          if len(values) < 20:
              print("--- DEBUG: NORMALIZED OUTPUT PREVIEW ---")
              print(normalized[:1000])
              print("----------------------------------------")
              raise SystemExit(f"Only found {len(values)} values. Database was not overwritten.")

          # 3. Formulate the Lua table output
          lines = ["return {"]
          for key, item in sorted(values.items()):
              safe_key = key.replace("\\", "\\\\").replace('"', '\\"')
              lines.append(f'    ["{safe_key}"] = {{')
              for field, value in item.items():
                  safe_field = str(value).replace("\\", "\\\\").replace('"', '\\"')
                  lines.append(f'        {field} = "{safe_field}",')
              lines.append("    },")
          lines.append("}")

          Path("amvgg_values.lua").write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"Successfully generated database with {len(values)} items.")
          PY

      - name: Commit updated database
        run: |
          git config user.name "AMVGG Value Updater"
          git config user.email "actions@github.com"
          git add amvgg_values.lua
          git diff --cached --quiet || git commit -m "Update AMVGG values"
          git push
