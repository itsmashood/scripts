name: Update AMVGG Values

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  update-values:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download AMVGG calculator
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen

          url = "https://amvgg.com/calculator"
          req = Request(url, headers={
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
          })

          with urlopen(req, timeout=30) as response:
              html = response.read().decode("utf-8", errors="ignore")

          Path("calculator.html").write_text(html, encoding="utf-8")
          print(f"Downloaded calculator.html with {len(html)} characters.")
          PY

      - name: Extract values and write Lua database
        run: |
          python3 - <<'PY'
          import html
          import json
          import re
          from pathlib import Path

          raw_html = Path("calculator.html").read_text(encoding="utf-8", errors="ignore")

          def clean_text(value):
              if value is None:
                  return ""
              return str(value).replace("\\u0026", "&").strip()

          def clean_number(value):
              value = clean_text(value)
              if value in ["", "None", "null", "undefined", "N/A"]:
                  return ""

              match = re.search(r"-?\d+(?:\.\d+)?", value.replace(",", ""))
              return match.group(0) if match else ""

          def compact_key(value):
              return re.sub(r"[^a-z0-9]", "", str(value).lower())

          FIELD_ALIASES = {
              "regular": [
                  "regularValue", "regular", "value", "normalValue", "frValue",
                  "flyRideValue", "regularFRValue", "rValue"
              ],
              "neon": [
                  "neonValue", "neon", "nfrValue", "neonFRValue", "neonFlyRideValue"
              ],
              "mega": [
                  "megaValue", "mega", "mfrValue", "megaFRValue", "megaFlyRideValue"
              ],
              "noPotionRegular": [
                  "npRegularValue", "noPotionRegularValue", "noPotRegularValue",
                  "noPotionRegular", "npRegular", "noPotionValue", "noPotValue",
                  "regularNoPotionValue", "regularNPValue"
              ],
              "noPotionNeon": [
                  "npNeonValue", "noPotionNeonValue", "noPotNeonValue",
                  "noPotionNeon", "npNeon", "neonNoPotionValue", "neonNPValue"
              ],
              "noPotionMega": [
                  "npMegaValue", "noPotionMegaValue", "noPotMegaValue",
                  "noPotionMega", "npMega", "megaNoPotionValue", "megaNPValue"
              ],
              "demand": [
                  "regularDemand", "demand", "demandValue"
              ],
              "id": [
                  "id", "_id", "slug"
              ],
          }

          COMPACT_ALIASES = {
              output_field: [compact_key(alias) for alias in aliases]
              for output_field, aliases in FIELD_ALIASES.items()
          }

          def get_field_from_dict(data, output_field):
              if not isinstance(data, dict):
                  return ""

              for alias in FIELD_ALIASES[output_field]:
                  if alias in data and data[alias] not in [None, ""]:
                      return clean_text(data[alias])

              compact_lookup = {compact_key(k): v for k, v in data.items()}
              for alias in COMPACT_ALIASES[output_field]:
                  if alias in compact_lookup and compact_lookup[alias] not in [None, ""]:
                      return clean_text(compact_lookup[alias])

              return ""

          def normalize_item(data):
              name = clean_text(data.get("name"))
              if not name:
                  return None

              lower_name = name.lower()
              if len(name) > 80 or lower_name in ["viewport", "charset", "description"]:
                  return None

              item = {
                  "name": name,
                  "id": get_field_from_dict(data, "id"),
                  "regular": clean_number(get_field_from_dict(data, "regular")),
                  "neon": clean_number(get_field_from_dict(data, "neon")),
                  "mega": clean_number(get_field_from_dict(data, "mega")),
                  "noPotionRegular": clean_number(get_field_from_dict(data, "noPotionRegular")),
                  "noPotionNeon": clean_number(get_field_from_dict(data, "noPotionNeon")),
                  "noPotionMega": clean_number(get_field_from_dict(data, "noPotionMega")),
                  "demand": clean_text(get_field_from_dict(data, "demand")),
              }

              has_value = any(item[k] for k in [
                  "regular", "neon", "mega",
                  "noPotionRegular", "noPotionNeon", "noPotionMega"
              ])

              if not has_value:
                  return None

              return item

          def item_score(item):
              score = 0
              for key in ["regular", "neon", "mega", "noPotionRegular", "noPotionNeon", "noPotionMega"]:
                  if item.get(key):
                      score += 1
              if item.get("id"):
                  score += 1
              if item.get("demand"):
                  score += 1
              return score

          found_items = {}

          def add_item(item):
              if not item:
                  return

              key = item["name"].lower()
              old = found_items.get(key)

              if old is None or item_score(item) > item_score(old):
                  found_items[key] = item

          def walk_json(obj):
              if isinstance(obj, dict):
                  add_item(normalize_item(obj))
                  for value in obj.values():
                      walk_json(value)
              elif isinstance(obj, list):
                  for value in obj:
                      walk_json(value)

          # 1. Try structured JSON from Next.js/app scripts first.
          for match in re.finditer(r'<script[^>]*type=["\']application/json["\'][^>]*>(.*?)</script>', raw_html, re.S | re.I):
              text = html.unescape(match.group(1)).strip()
              if not text:
                  continue

              try:
                  data = json.loads(text)
              except Exception:
                  continue

              walk_json(data)

          # 2. Try __NEXT_DATA__ specifically.
          next_match = re.search(r'<script[^>]*id=["\']__NEXT_DATA__["\'][^>]*>(.*?)</script>', raw_html, re.S | re.I)
          if next_match:
              text = html.unescape(next_match.group(1)).strip()
              try:
                  data = json.loads(text)
                  walk_json(data)
              except Exception as err:
                  print("Could not parse __NEXT_DATA__:", err)

          # 3. Fallback raw object extraction around every "name":"..." occurrence.
          normalized = raw_html
          normalized = html.unescape(normalized)
          normalized = normalized.replace('\\"', '"')
          normalized = normalized.replace("\\u0026", "&")

          def find_object_bounds(text, name_start):
              start = text.rfind("{", 0, name_start)
              if start == -1:
                  return None

              depth = 0
              in_string = False
              escape = False

              for i in range(start, min(len(text), start + 6000)):
                  ch = text[i]

                  if escape:
                      escape = False
                      continue

                  if ch == "\\":
                      escape = True
                      continue

                  if ch == '"':
                      in_string = not in_string
                      continue

                  if in_string:
                      continue

                  if ch == "{":
                      depth += 1
                  elif ch == "}":
                      depth -= 1
                      if depth == 0:
                          return start, i + 1

              return None

          def extract_raw_field(block, field_name):
              patterns = [
                  r'"' + re.escape(field_name) + r'"\s*:\s*"([^"]*)"',
                  r'"' + re.escape(field_name) + r'"\s*:\s*([0-9.-]+)',
              ]

              for pattern in patterns:
                  match = re.search(pattern, block)
                  if match:
                      return match.group(1)

              return ""

          name_pattern = re.compile(r'"name"\s*:\s*"([^"]+)"')

          for name_match in name_pattern.finditer(normalized):
              bounds = find_object_bounds(normalized, name_match.start())
              if not bounds:
                  continue

              block = normalized[bounds[0]:bounds[1]]
              name = clean_text(name_match.group(1))

              raw_obj = {"name": name}

              possible_fields = set()
              for aliases in FIELD_ALIASES.values():
                  possible_fields.update(aliases)

              for field in possible_fields:
                  value = extract_raw_field(block, field)
                  if value != "":
                      raw_obj[field] = value

              add_item(normalize_item(raw_obj))

          if len(found_items) < 100:
              print("--- DEBUG: HTML PREVIEW ---")
              print(raw_html[:2000])
              print("--- FOUND ITEMS ---")
              print(len(found_items))
              raise SystemExit("Too few values found. Database was not overwritten.")

          def lua_escape(value):
              return str(value).replace("\\", "\\\\").replace('"', '\\"')

          lines = ["return {"]

          for key in sorted(found_items.keys()):
              item = found_items[key]
              safe_key = lua_escape(key)

              lines.append(f'    ["{safe_key}"] = {{')
              for field in ["name", "id", "regular", "neon", "mega", "noPotionRegular", "noPotionNeon", "noPotionMega", "demand"]:
                  safe_value = lua_escape(item.get(field, ""))
                  lines.append(f'        {field} = "{safe_value}",')
              lines.append("    },")

          lines.append("}")

          Path("amvgg_values.lua").write_text("\n".join(lines) + "\n", encoding="utf-8")

          print(f"Successfully generated database with {len(found_items)} items.")

          focus_names = [
              "gumball caterpillar",
              "red panda",
              "shiba inu",
              "ant",
              "cow",
              "shadow dragon",
          ]

          print("--- Focus item check ---")
          for name in focus_names:
              item = found_items.get(name)
              print(name, "=>", item)

          missing_np_mega = [
              item["name"]
              for item in found_items.values()
              if item.get("mega") and not item.get("noPotionMega")
          ]

          print(f"Items with mega but missing noPotionMega: {len(missing_np_mega)}")
          print("First 25 missing noPotionMega:", missing_np_mega[:25])
          PY

      - name: Commit updated database
        run: |
          git config user.name "AMVGG Value Updater"
          git config user.email "actions@github.com"
          git add amvgg_values.lua
          git diff --cached --quiet || git commit -m "Update AMVGG values"
          git push
