name: Update AMVGG Values

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  update-values:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download AMVGG calculator
        run: curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" "https://amvgg.com/calculator" -o calculator.html

      - name: Extract values and write Lua database
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          html = Path("calculator.html").read_text(encoding="utf-8", errors="ignore")

          # Looser regex to find chunks containing pet data, allowing nested elements
          pattern = re.compile(r'\{[^}]+?"name"\s*:\s*"[^"]+?".+?\}', re.S)

          values = {}

          def get_field(text, field_name, default=""):
              match = re.search(r'"' + re.escape(field_name) + r'"\s*:\s*"([^"]*)"', text)
              return match.group(1) if match else default

          for match in pattern.finditer(html):
              record = match.group(0)
              name = get_field(record, "name")

              if not name or "regularValue" not in record:
                  continue

              values[name.lower()] = {
                  "name": name,
                  "id": get_field(record, "id"),
                  "regular": get_field(record, "regularValue"),
                  "neon": get_field(record, "neonValue"),
                  "mega": get_field(record, "megaValue"),
                  "noPotionRegular": get_field(record, "npRegularValue"),
                  "noPotionNeon": get_field(record, "npNeonValue"),
                  "noPotionMega": get_field(record, "npMegaValue"),
                  "demand": get_field(record, "regularDemand"),
              }

          # Debugging aid: If it fails, print the HTML layout so you can see if it's Cloudflare
          if len(values) < 20:
              print("--- DEBUG: HTML SNIPPET ---")
              print(html[:1000]) 
              print("---------------------------")
              raise SystemExit(f"Only found {len(values)} values. Database was not overwritten.")

          lines = ["return {"]
          for key, item in sorted(values.items()):
              safe_key = key.replace("\\", "\\\\").replace('"', '\\"')
              lines.append(f'    ["{safe_key}"] = {{')
              for field, value in item.items():
                  safe_field = str(value).replace("\\", "\\\\").replace('"', '\\"')
                  lines.append(f'        {field} = "{safe_field}",')
              lines.append("    },")
          lines.append("}")

          Path("amvgg_values.lua").write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"Updated {len(values)} values.")
          PY

      - name: Commit updated database
        run: |
          git config user.name "AMVGG Value Updater"
          git config user.email "actions@github.com"
          git add amvgg_values.lua
          git diff --cached --quiet || git commit -m "Update AMVGG values"
          git push
